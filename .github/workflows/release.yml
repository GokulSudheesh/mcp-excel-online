name: Publishing

on:
  release:
    types: [published]

jobs:
  release-build:
    name: Build distribution
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen --all-extras --dev --python 3.13

      - name: Set version from release tag
        run: uv version "${GITHUB_REF_NAME#v}" # strips a leading 'v' from tag like v1.2.3

      - name: Build package
        run: uv build

      - name: Publish
        run: uv publish
